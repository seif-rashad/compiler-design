<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compiler Design — Exam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f6f3;
  --surface: #ffffff;
  --border: #e2e0da;
  --border-strong: #c8c5bc;
  --text: #1a1916;
  --text-secondary: #6b6860;
  --text-tertiary: #9e9b94;
  --accent: #1a1916;
  --success-bg: #edf7ee;
  --success-border: #a8d5ab;
  --success-text: #2d6e32;
  --danger-bg: #fdf0ef;
  --danger-border: #f0aba5;
  --danger-text: #8b2217;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

html { font-size: 16px; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

/* Layout */
.site-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.01em;
  color: var(--text);
  text-decoration: none;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 1.5rem;
}
.header-stat {
  font-size: 12px;
  color: var(--text-tertiary);
  font-family: var(--mono);
}
.header-stat span { color: var(--text); font-weight: 500; }

.main {
  max-width: 780px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 4rem;
}

/* Start screen */
.start-screen { max-width: 560px; margin: 3rem auto 0; }
.start-screen h1 {
  font-size: 28px;
  font-weight: 300;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  line-height: 1.2;
}
.start-screen .subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 2.5rem;
  font-family: var(--mono);
}
.stat-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 2rem;
}
.stat-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem;
  text-align: center;
}
.stat-cell .num {
  font-size: 28px;
  font-weight: 300;
  font-family: var(--mono);
  letter-spacing: -0.02em;
  display: block;
  margin-bottom: 2px;
}
.stat-cell .lbl {
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.mode-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 1.5rem;
}
.mode-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.25rem;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
  text-align: left;
}
.mode-card:hover { border-color: var(--border-strong); }
.mode-card.active {
  border-color: var(--text);
  box-shadow: inset 0 0 0 1px var(--text);
}
.mode-card .mode-title {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 4px;
}
.mode-card .mode-desc {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
}
.mode-card .mode-icon {
  font-family: var(--mono);
  font-size: 18px;
  margin-bottom: 10px;
  color: var(--text-tertiary);
}
.btn-start {
  width: 100%;
  padding: 13px;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-family: var(--sans);
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.01em;
  transition: opacity 0.15s;
}
.btn-start:hover { opacity: 0.85; }

/* Progress */
.progress-track {
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
  margin-bottom: 2rem;
}
.p-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  background: var(--border);
  cursor: pointer;
  transition: background 0.1s;
  flex-shrink: 0;
}
.p-dot:hover { background: var(--border-strong); }
.p-dot.current { background: var(--text); }
.p-dot.ok { background: var(--success-border); }
.p-dot.bad { background: var(--danger-border); }
.p-dot.skipped { background: #d4c9b0; }

/* Question */
.q-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 1.75rem;
}
.q-num {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-tertiary);
  letter-spacing: 0.04em;
}
.q-section-badge {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text-tertiary);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 8px;
}
.q-text {
  font-size: 18px;
  font-weight: 300;
  line-height: 1.55;
  letter-spacing: -0.01em;
  margin-bottom: 1.75rem;
  color: var(--text);
}

/* Options */
.options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
.option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: border-color 0.12s, background 0.12s;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  background: var(--surface);
  text-align: left;
  width: 100%;
  font-family: var(--sans);
}
.option:hover:not(.locked) { border-color: var(--border-strong); background: #fafaf8; }
.option .opt-key {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-tertiary);
  min-width: 14px;
  padding-top: 1px;
}
.option.selected { border-color: var(--text); background: #f7f6f3; }
.option.selected .opt-key { color: var(--text); }
.option.correct { border-color: var(--success-border); background: var(--success-bg); color: var(--success-text); }
.option.correct .opt-key { color: var(--success-text); }
.option.wrong { border-color: var(--danger-border); background: var(--danger-bg); color: var(--danger-text); }
.option.wrong .opt-key { color: var(--danger-text); }
.option.reveal { border-color: var(--success-border); background: var(--success-bg); color: var(--success-text); }
.option.reveal .opt-key { color: var(--success-text); }
.option.locked { cursor: default; }

/* T/F */
.tf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
.tf-btn {
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 400;
  font-family: var(--sans);
  color: var(--text);
  background: var(--surface);
  transition: border-color 0.12s, background 0.12s;
  letter-spacing: 0.01em;
}
.tf-btn:hover:not(.locked) { border-color: var(--border-strong); }
.tf-btn.selected { border-color: var(--text); background: #f7f6f3; font-weight: 500; }
.tf-btn.correct { border-color: var(--success-border); background: var(--success-bg); color: var(--success-text); }
.tf-btn.wrong { border-color: var(--danger-border); background: var(--danger-bg); color: var(--danger-text); }
.tf-btn.reveal { border-color: var(--success-border); background: var(--success-bg); color: var(--success-text); }
.tf-btn.locked { cursor: default; }

/* Feedback */
.feedback {
  font-size: 13px;
  padding: 10px 14px;
  border-radius: 6px;
  margin-bottom: 1.25rem;
  font-family: var(--mono);
}
.feedback.ok { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
.feedback.bad { background: var(--danger-bg); color: var(--danger-text); border: 1px solid var(--danger-border); }

/* Nav */
.nav-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 0.5rem;
  border-top: 1px solid var(--border);
}
.btn {
  padding: 9px 20px;
  border: 1px solid var(--border);
  border-radius: 7px;
  cursor: pointer;
  font-size: 13px;
  font-family: var(--sans);
  color: var(--text);
  background: var(--surface);
  transition: background 0.12s, border-color 0.12s;
  font-weight: 400;
}
.btn:hover:not(:disabled) { background: #f0efe9; border-color: var(--border-strong); }
.btn:disabled { opacity: 0.3; cursor: default; }
.btn.primary {
  background: var(--text);
  color: white;
  border-color: var(--text);
}
.btn.primary:hover { opacity: 0.85; }
.nav-center { font-size: 12px; color: var(--text-tertiary); font-family: var(--mono); }

/* Section divider */
.section-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 2rem 0 1.75rem;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
  font-family: var(--mono);
}
.section-divider::before, .section-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Results */
.results-wrap { max-width: 560px; margin: 0 auto; }
.score-hero {
  text-align: center;
  padding: 3rem 1.5rem 2.5rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 1.25rem;
}
.score-hero .big-num {
  font-size: 72px;
  font-weight: 300;
  font-family: var(--mono);
  letter-spacing: -0.04em;
  line-height: 1;
  margin-bottom: 4px;
}
.score-hero .grade-badge {
  display: inline-block;
  font-family: var(--mono);
  font-size: 13px;
  padding: 3px 12px;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-secondary);
  margin-bottom: 1.5rem;
}
.results-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 1.5rem;
}
.r-cell {
  background: var(--bg);
  border-radius: 6px;
  padding: 0.75rem;
  text-align: center;
}
.r-cell .rn { font-size: 22px; font-weight: 300; font-family: var(--mono); letter-spacing: -0.02em; }
.r-cell .rl { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
.btn-retake {
  width: 100%;
  padding: 11px;
  border: 1px solid var(--border);
  border-radius: 7px;
  font-size: 13px;
  font-family: var(--sans);
  color: var(--text-secondary);
  background: transparent;
  cursor: pointer;
}
.btn-retake:hover { background: var(--bg); border-color: var(--border-strong); }

/* Review */
.review-section { margin-top: 2rem; }
.review-section h2 {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-tertiary);
  font-weight: 400;
  font-family: var(--mono);
  margin-bottom: 1rem;
}
.review-item {
  padding: 1rem 0;
  border-bottom: 1px solid var(--border);
}
.review-item:last-child { border-bottom: none; }
.review-qnum {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text-tertiary);
  margin-bottom: 5px;
}
.review-qtext {
  font-size: 14px;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 6px;
  font-weight: 300;
}
.review-your {
  font-size: 12px;
  font-family: var(--mono);
  color: var(--danger-text);
  margin-bottom: 2px;
}
.review-correct {
  font-size: 12px;
  font-family: var(--mono);
  color: var(--success-text);
}

/* Unanswered notice */
.notice {
  font-size: 12px;
  color: var(--text-tertiary);
  font-family: var(--mono);
  padding: 8px 12px;
  border: 1px dashed var(--border);
  border-radius: 6px;
  margin-bottom: 1.5rem;
}

/* Responsive */
@media (max-width: 600px) {
  .main { padding: 1.5rem 1rem 3rem; }
  .site-header { padding: 0 1rem; }
  .q-text { font-size: 16px; }
  .header-stat { display: none; }
  .results-grid, .stat-row { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

</header>

<main class="main" id="app"></main>

let state = { screen: 'start', mode: 'exam', current: 0, answers: {}, submitted: false };

function $(id) { return document.getElementById(id); }
function app() { return $('app'); }

function updateHeader() {
  const stat = $('hdr-stat');
  if (state.screen === 'exam') {
    const answered = Object.keys(state.answers).length;
    stat.innerHTML = `<span>${answered}</span> / 100 answered`;
  } else if (state.screen === 'results') {
    stat.innerHTML = 'Results';
  } else {
    stat.innerHTML = '—';
  }
}

function render() {
  updateHeader();
  if (state.screen === 'start') renderStart();
  else if (state.screen === 'exam') renderExam();
  else if (state.screen === 'results') renderResults();
}

function renderStart() {
  app().innerHTML = `
    <div class="start-screen">
      <h1>Compiler Design<br>Question Bank</h1>
      <p class="subtitle">CSC · 2025 Edition</p>
      <div class="stat-row">
        <div class="stat-cell"><span class="num">70</span><span class="lbl">MCQ</span></div>
        <div class="stat-cell"><span class="num">30</span><span class="lbl">True / False</span></div>
        <div class="stat-cell"><span class="num">100</span><span class="lbl">Total</span></div>
      </div>
      <div class="mode-cards">
        <div class="mode-card ${state.mode==='exam'?'active':''}" onclick="setMode('exam')">
          <div class="mode-icon">[ ]</div>
          <div class="mode-title">Exam mode</div>
          <div class="mode-desc">Answer all questions, then submit to see your score.</div>
        </div>
        <div class="mode-card ${state.mode==='practice'?'active':''}" onclick="setMode('practice')">
          <div class="mode-icon">[✓]</div>
          <div class="mode-title">Practice mode</div>
          <div class="mode-desc">Instant feedback after each answer.</div>
        </div>
      </div>
      <button class="btn-start" onclick="startExam()">Begin →</button>
    </div>`;
}

function setMode(m) {
  state.mode = m;
  renderStart();
}

function startExam() {
  state.screen = 'exam';
  state.current = 0;
  state.answers = {};
  render();
}

function renderExam() {
  const q = QUESTIONS[state.current];
  const answered = state.answers[q.id] !== undefined;
  const correct = ANSWERS[q.id];
  const userAns = state.answers[q.id];
  const showFeedback = state.mode === 'practice' && answered;
  const total = QUESTIONS.length;
  const answeredCount = Object.keys(state.answers).length;
  const isLast = state.current === total - 1;
  const allAnswered = answeredCount === total;

  // Progress dots
  let dots = '<div class="progress-track">';
  for (let i = 0; i < total; i++) {
    const dq = QUESTIONS[i];
    let cls = 'p-dot';
    if (i === state.current) cls += ' current';
    else if (state.answers[dq.id] !== undefined) {
      if (state.mode === 'practice') {
        cls += state.answers[dq.id] === ANSWERS[dq.id] ? ' ok' : ' bad';
      } else {
        cls += ' skipped';
      }
    }
    dots += `<div class="${cls}" title="Q${i+1}" onclick="jumpTo(${i})"></div>`;
  }
  dots += '</div>';

  // Section divider at Q71
  const showDivider = state.current === 70;

  // Options
  let optHtml = '';
  if (q.type === 'mcq') {
    optHtml = '<div class="options">';
    for (const [k, v] of Object.entries(q.options)) {
      let cls = 'option';
      if (answered) {
        cls += ' locked';
        if (showFeedback) {
          if (k === correct) cls += ' correct';
          else if (k === userAns) cls += ' wrong';
        } else {
          if (k === userAns) cls += ' selected';
        }
      }
      optHtml += `<button class="${cls}" onclick="doAnswer('${q.id}','${k}')">
        <span class="opt-key">${k}</span><span>${v}</span>
      </button>`;
    }
    optHtml += '</div>';
  } else {
    let tCls = 'tf-btn', fCls = 'tf-btn';
    if (answered) {
      tCls += ' locked'; fCls += ' locked';
      if (showFeedback) {
        tCls += correct === true ? ' correct' : (userAns === true ? ' wrong' : '');
        fCls += correct === false ? ' correct' : (userAns === false ? ' wrong' : '');
      } else {
        if (userAns === true) tCls += ' selected';
        if (userAns === false) fCls += ' selected';
      }
    }
    optHtml = `<div class="tf-row">
      <button class="${tCls}" onclick="doAnswer('${q.id}',true)">True</button>
      <button class="${fCls}" onclick="doAnswer('${q.id}',false)">False</button>
    </div>`;
  }

  let feedbackHtml = '';
  if (showFeedback && answered) {
    const ok = userAns === correct;
    feedbackHtml = `<div class="feedback ${ok?'ok':'bad'}">${ok ? '✓ correct' : '✗ incorrect — see highlighted answer above'}</div>`;
  }

  let unansweredNotice = '';
  if (state.mode === 'exam' && isLast && !allAnswered) {
    unansweredNotice = `<div class="notice">${100 - answeredCount} question${100-answeredCount!==1?'s':''} unanswered — use the dots above to navigate back.</div>`;
  }

  let navRight = '';
  if (!isLast) {
    navRight = `<button class="btn" onclick="nextQ()">Next →</button>`;
  } else {
    navRight = `<button class="btn primary" onclick="submitExam()" ${state.mode==='exam'&&!allAnswered?'disabled':''}>Submit exam</button>`;
  }

  app().innerHTML = `
    ${dots}
    <div class="q-header">
      <span class="q-num">Q${state.current+1} of ${total}</span>
      <span class="q-section-badge">Part ${q.section} · ${q.type==='mcq'?'MCQ':'True / False'}</span>
    </div>
    <div class="q-text">${q.text}</div>
    ${optHtml}
    ${feedbackHtml}
    ${unansweredNotice}
    <div class="nav-row">
      <button class="btn" onclick="prevQ()" ${state.current===0?'disabled':''}>← Previous</button>
      <span class="nav-center">${answeredCount} / ${total}</span>
      ${navRight}
    </div>`;
}

function doAnswer(id, val) {
  if (state.mode === 'practice' && state.answers[id] !== undefined) return;
  state.answers[id] = val;
  render();
}

function nextQ() { if (state.current < 99) { state.current++; render(); } }
function prevQ() { if (state.current > 0) { state.current--; render(); } }
function jumpTo(i) { state.current = i; render(); }

function submitExam() {
  state.screen = 'results';
  render();
}

function renderResults() {
  let correct = 0, mcqC = 0, tfC = 0;
  QUESTIONS.forEach(q => {
    if (state.answers[q.id] === ANSWERS[q.id]) {
      correct++;
      q.type === 'mcq' ? mcqC++ : tfC++;
    }
  });
  const pct = Math.round((correct / 100) * 100);
  const grade = pct>=90?'A':pct>=80?'B':pct>=70?'C':pct>=60?'D':'F';

  let reviewHtml = '';
  QUESTIONS.forEach((q, i) => {
    const ok = state.answers[q.id] === ANSWERS[q.id];
    if (!ok) {
      const ca = ANSWERS[q.id];
      let correctText = '';
      if (q.type === 'mcq') correctText = `${ca}) ${q.options[ca]}`;
      else correctText = ca ? 'True' : 'False';
      let yourText = '';
      if (state.answers[q.id] !== undefined) {
        if (q.type === 'mcq') yourText = `${state.answers[q.id]}) ${q.options[state.answers[q.id]]}`;
        else yourText = state.answers[q.id] ? 'True' : 'False';
      } else {
        yourText = 'Not answered';
      }
      reviewHtml += `<div class="review-item">
        <div class="review-qnum">Q${i+1} · Part ${q.section}</div>
        <div class="review-qtext">${q.text}</div>
        <div class="review-your">✗ Your answer: ${yourText}</div>
        <div class="review-correct">✓ Correct: ${correctText}</div>
      </div>`;
    }
  });

  app().innerHTML = `
    <div class="results-wrap">
      <div class="score-hero">
        <div class="big-num">${pct}%</div>
        <div class="grade-badge">Grade ${grade}</div>
        <div class="results-grid">
          <div class="r-cell"><div class="rn">${correct}<span style="font-size:14px;color:var(--text-tertiary)">/100</span></div><div class="rl">Correct</div></div>
          <div class="r-cell"><div class="rn">${mcqC}<span style="font-size:14px;color:var(--text-tertiary)">/70</span></div><div class="rl">MCQ</div></div>
          <div class="r-cell"><div class="rn">${tfC}<span style="font-size:14px;color:var(--text-tertiary)">/30</span></div><div class="rl">True/False</div></div>
        </div>
        <button class="btn-retake" onclick="goHome()">← Take again</button>
      </div>
      ${reviewHtml ? `<div class="review-section"><h2>Incorrect answers (${100-correct})</h2>${reviewHtml}</div>` : '<div style="text-align:center;padding:2rem;font-family:var(--mono);font-size:13px;color:var(--text-tertiary);">Perfect score — all 100 correct.</div>'}
    </div>`;
}

function goHome() {
  state = { screen: 'start', mode: state.mode, current: 0, answers: {}, submitted: false };
  render();
}

render();
</script>
</body>
</html>
